<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ПЗУ Ортомедика - Админ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f8f7; color: #133332; }
    .wrap { max-width: 1100px; width: 100%; margin: 20px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #d9e9e6; border-radius: 12px; padding: 16px; margin-bottom: 16px; width: 100%; }
    .top-actions { display:flex; justify-content:flex-end; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .section-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .appointments-head {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }
    .appointments-head h2 {
      flex: 0 0 auto;
      white-space: nowrap;
      margin: 0;
    }
    h1, h2 { margin-top: 0; }
    label { display: block; font-weight: 700; margin: 8px 0 6px; }
    input, select, button { width: 100%; min-width: 0; box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid #cfe1dd; }
    input, select { height: 42px; }
    button { background: #1fa884; border: none; color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; }
    button:hover { background: #179977; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid > div { min-width: 0; overflow: hidden; }
    input[type="date"],
    input[type="time"],
    select {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      inline-size: 100%;
      min-inline-size: 0;
    }
    @supports (-webkit-touch-callout: none) {
      input[type="date"],
      input[type="time"] {
        -webkit-appearance: none;
        appearance: none;
        max-width: 100% !important;
        width: 100% !important;
      }
      input[type="date"]::-webkit-date-and-time-value,
      input[type="time"]::-webkit-date-and-time-value {
        text-align: left;
      }
    }
    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #e4efec; text-align: left; padding: 8px; font-size: 14px; }
    .muted { color: #607c77; font-size: 14px; }
    .req { color: #b42318; margin-left: 2px; }
    .msg-success { color: #18794e; }
    .msg-error { color: #b42318; }
    .row-actions { display: flex; gap: 8px; }
    .appointments-tools {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      scrollbar-width: thin;
    }
    .appointments-tools .small {
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .appointments-tools .muted {
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .appointments-search {
      width: 220px;
      min-width: 220px;
      max-width: 220px;
      height: 36px;
      margin: 0;
      padding: 8px 10px;
      flex: 0 0 auto;
    }
    .pagination-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .pagination-tools .small {
      width: auto;
      margin-top: 0;
    }
    .pagination-select {
      width: auto;
      min-width: 84px;
      height: 36px;
      padding: 6px 8px;
    }
    .small { width: auto; padding: 6px 10px; }
    .day-view-head { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    .day-view-head > div { min-width: 0; flex: 1 1 0; }
    .status-chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .status-free { background: #e8f6f2; color: #0f7f64; }
    .status-booked { background: #ffeecf; color: #8f5f00; }
    .status-confirmed { background: #dff2ff; color: #0d5f92; }
    .status-cancelled { background: #f2f4f6; color: #586774; }
    .status-completed { background: #e8f5e9; color: #2e7d32; }
    .man-slots { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 20px; }
    .man-slot { width: auto; min-height: 44px; padding: 10px 14px; border: 1px solid #1fa884; color: #1fa884; background: #fff; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .man-slot:hover { background: #eaf7f3; }
    .man-slot.active { background: #1fa884; color: #fff; }
    .man-slot:disabled { border-color: #d92d20; color: #d92d20; background: #fff5f5; cursor: not-allowed; }
    .man-slots-label { font-size: 13px; color: #607c77; margin-top: 4px; }
    .inline-tools { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .tool-btn { width: auto; padding: 6px 10px; font-size: 13px; background: #eaf7f3; color: #1a7f66; border: 1px solid #cfe1dd; }
    .tool-btn:hover { background: #dff2ec; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .modal-backdrop.show { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border: 1px solid #d9e9e6;
      border-radius: 12px;
      padding: 14px;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .modal-head h3 { margin: 0; }
    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .edit-grid > div { min-width: 0; }
    .edit-grid .full { grid-column: 1 / -1; }
    .edit-slots { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .edit-slot { width: auto; min-height: 40px; padding: 8px 12px; border: 1px solid #1fa884; color: #1fa884; background: #fff; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .edit-slot.active { background: #1fa884; color: #fff; }
    .edit-slot:disabled { border-color: #d92d20; color: #d92d20; background: #fff5f5; cursor: not-allowed; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    .btn-secondary { background: #eef3f2; color: #17322f; border: 1px solid #cfe1dd; }
    .btn-secondary:hover { background: #e3ecea; }
    #__bs_notify__ { display: none !important; }
    #__bs_notify__ + div { display: none !important; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (hover: none) and (pointer: coarse) and (max-width: 1024px) {
      .wrap { padding: 0 12px; margin: 16px auto; }
      .card { padding: 12px; }
      .grid { grid-template-columns: 1fr; gap: 8px; }
      .grid > div { width: 100%; min-width: 0; }
      .day-view-head { flex-direction: column; align-items: stretch; gap: 8px; }
      .day-view-head > div { width: 100%; }
      .top-actions,
      .section-head,
      .row-actions { flex-direction: column; align-items: stretch; }
      .row-actions { width: 100%; }
      .appointments-head {
        flex-direction: row;
        align-items: center;
      }
      .appointments-tools {
        flex-direction: row;
        align-items: center;
      }
      .small { width: 100%; }
      .appointments-tools .small { width: auto; }
      input, select { height: 40px; padding: 8px; }
      button { min-height: 40px; }
      .man-slots { gap: 10px; }
      .man-slot { flex: 1 1 calc(50% - 10px); justify-content: center; }
    }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) {
      .wrap { padding: 0 12px; margin: 16px auto; }
      .card { padding: 12px; }
      input, select, button { padding: 8px; }
      input, select { height: 40px; }
      .grid { gap: 8px; }
      .day-view-head { flex-direction: column; align-items: stretch; gap: 8px; }
      .day-view-head > div { min-width: 0; width: 100%; }
      .top-actions,
      .section-head,
      .row-actions { flex-direction: column; align-items: stretch; }
      .row-actions { width: 100%; }
      .appointments-head {
        flex-direction: row;
        align-items: center;
      }
      .appointments-tools {
        flex-direction: row;
        align-items: center;
      }
      .small { width: 100%; }
      .appointments-tools .small { width: auto; }
      .table-wrap { margin-top: 10px; }
      .table-wrap table { min-width: 720px; }
      .table-wrap .small { width: auto; }
      th, td { padding: 6px; font-size: 13px; white-space: nowrap; }
      .man-slots { gap: 10px; }
      .man-slot { flex: 1 1 calc(50% - 10px); justify-content: center; }
      .edit-grid { grid-template-columns: 1fr; }
      .modal-actions { flex-direction: column; }
      .modal-actions .small { width: 100%; }
    }
    @media (max-width: 360px) {
      .man-slot { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-actions">
      <button id="logoutBtn" class="small" style="margin:0;">Одјави се</button>
    </div>
    <div class="card">
      <h2>Дневен преглед</h2>
      <div class="day-view-head">
        <div>
          <label>Датум</label>
          <input id="dayViewDate" type="date" />
        </div>
        <div>
          <button id="refreshDayView" class="small">Освежи преглед</button>
        </div>
      </div>
      <p id="dayViewSummary" class="muted">Одбери датум за преглед.</p>
      <div class="table-wrap">
      <table>
        <thead><tr><th>Време</th><th>Состојба</th><th>Пациент</th><th>Телефон</th><th>Услуга</th><th>Забелешка</th></tr></thead>
        <tbody id="dayViewRows"></tbody>
      </table>
      </div>
    </div>

    <div class="card">
      <h2>Додади термин (телефон)</h2>
      <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <div><label>Пациент <span class="req">*</span></label><input id="manPatient" type="text" required /></div>
        <div><label>Е-пошта (опц.)</label><input id="manEmail" type="email" /></div>
        <div style="grid-column: 1 / -1;"><label>Тип услуга <span class="req">*</span></label>
          <select id="manService" required>
            <option value="" selected disabled>Изберете преглед</option>
            <option value="контрола">контрола</option>
            <option value="интервенција">интервенција</option>
            <option value="преглед за бебиња до 6 месеци">преглед за бебиња до 6 месеци (Пон/Чет)</option>
            <option value="преглед за деца над 6 месеци">преглед за деца над 6 месеци</option>
            <option value="преглед кај возрасни">преглед кај возрасни</option>
            <option value="ултразвучен преглед">ултразвучен преглед</option>
            <option value="интраартикуларни инјекции">интраартикуларни инјекции</option>
          </select>
        </div>
        <div style="grid-column: 1 / -1;">
          <label>Датум <span class="req">*</span></label><input id="manDate" type="date" required />
          <div id="manSlotsWrap" style="margin-top:10px;">
            <label>Слободни термини <span class="req">*</span></label>
            <div id="manSlots" class="man-slots"></div>
            <p id="manSlotsMsg" class="man-slots-label">Изберете услуга и датум за да видите слободни термини.</p>
          </div>
        </div>
        <div style="grid-column: 1 / -1;"><label>Телефон <span class="req">*</span></label><input id="manPhone" type="tel" inputmode="numeric" pattern="[0-9]+" required /></div>
        <div style="grid-column: 1 / -1;"><label>Забелешка</label><input id="manNotes" type="text" placeholder="Телефонско закажување" /></div>
      </div>
      <button id="addManualAppointment" class="small">Додади термин</button>
      <p id="manualMessage" class="muted" role="status" aria-live="polite"></p>
    </div>

    <div class="card">
      <h2>Блокирај датум/време (одмор, отсутност)</h2>
      <div class="grid" style="margin-top:12px; border-top:1px solid #e4efec; padding-top:12px;">
        <div><label>Од датум <span class="req">*</span></label><input id="blFromDate" type="date" /></div>
        <div><label>До датум <span class="req">*</span></label><input id="blToDate" type="date" /></div>
        <div><label>Почеток <span class="req">*</span></label><input id="blRangeStart" type="time" step="1800" value="08:00" /></div>
        <div><label>Крај <span class="req">*</span></label><input id="blRangeEnd" type="time" step="1800" value="16:00" /></div>
      </div>
      <button id="addBlockRange" class="small">Блокирај период</button>
      <p id="blockRangeMessage" class="muted" role="status" aria-live="polite"></p>

      <div class="table-wrap">
      <table>
        <tbody id="blockRows"></tbody>
      </table>
      </div>
    </div>

    <div class="card">
      <div class="section-head appointments-head">
        <h2>Термини</h2>
        <div class="row-actions appointments-tools" style="align-items:center;">
          <button id="appointmentsPrint" class="small btn-secondary" type="button" style="margin:0;">Печати</button>
          <button id="appointmentsExport" class="small btn-secondary" type="button" style="margin:0;">CSV</button>
          <input id="appointmentsSearch" class="appointments-search" type="text" placeholder="Пребарај пациент/телефон" />
          <span id="appointmentsFilterLabel" class="muted"></span>
          <span id="appointmentsCountLabel" class="muted"></span>
          <button id="toggleAppointmentsScope" class="small" style="margin:0;">Прикажи сите</button>
        </div>
      </div>
      <div class="table-wrap">
      <table>
        <thead><tr><th>Датум</th><th>Време</th><th>Пациент</th><th>Телефон</th><th>Услуга</th><th>Статус</th><th></th></tr></thead>
        <tbody id="appointmentRows"></tbody>
      </table>
      </div>
      <div class="pagination-tools">
        <span id="appointmentsPageInfo" class="muted">Страна 1 од 1</span>
        <label for="appointmentsPageSize" class="muted" style="margin:0;">По страна</label>
        <select id="appointmentsPageSize" class="pagination-select">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button id="appointmentsPrev" class="small btn-secondary" type="button">Претходна</button>
        <button id="appointmentsNext" class="small btn-secondary" type="button">Следна</button>
      </div>
    </div>

    <div id="editModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="modal-head">
          <h3 id="editModalTitle">Измени термин</h3>
          <button id="closeEditModal" class="small btn-secondary" style="margin:0;">Затвори</button>
        </div>
        <div class="edit-grid">
          <div><label>Пациент <span class="req">*</span></label><input id="editPatient" type="text" /></div>
          <div><label>Е-пошта</label><input id="editEmail" type="email" /></div>
          <div class="full"><label>Тип услуга <span class="req">*</span></label>
            <select id="editService">
              <option value="контрола">контрола</option>
              <option value="интервенција">интервенција</option>
              <option value="преглед за бебиња до 6 месеци">преглед за бебиња до 6 месеци (Пон/Чет)</option>
              <option value="преглед за деца над 6 месеци">преглед за деца над 6 месеци</option>
              <option value="преглед кај возрасни">преглед кај возрасни</option>
              <option value="ултразвучен преглед">ултразвучен преглед</option>
              <option value="интраартикуларни инјекции">интраартикуларни инјекции</option>
            </select>
          </div>
          <div class="full"><label>Датум <span class="req">*</span></label><input id="editDate" type="date" /></div>
          <div class="full"><label>Слободни термини <span class="req">*</span></label>
            <div id="editSlots" class="edit-slots"></div>
            <p id="editSlotsMsg" class="muted"></p>
          </div>
          <div><label>Телефон <span class="req">*</span></label><input id="editPhone" type="tel" inputmode="numeric" pattern="[0-9]+" /></div>
          <div><label>Статус</label>
            <select id="editStatus">
              <option value="booked">Закажан</option>
              <option value="confirmed">Потврден</option>
              <option value="cancelled">Откажан</option>
              <option value="completed">Завршен</option>
            </select>
          </div>
          <div class="full"><label>Забелешка</label><input id="editNotes" type="text" /></div>
        </div>
        <p id="editMessage" class="muted" role="status" aria-live="polite"></p>
        <div class="modal-actions">
          <button id="saveEdit" class="small" type="button">Зачувај промени</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    let currentDoctorId = null;
    let selectedManSlot = "";
    const manDateEl = document.getElementById("manDate");
    const manSlotsWrapEl = document.getElementById("manSlotsWrap");
    const manSlotsEl = document.getElementById("manSlots");
    const manSlotsMsgEl = document.getElementById("manSlotsMsg");
    const manPatientEl = document.getElementById("manPatient");
    const manPhoneEl = document.getElementById("manPhone");
    const manEmailEl = document.getElementById("manEmail");
    const manServiceEl = document.getElementById("manService");
    const manNotesEl = document.getElementById("manNotes");
    const manualMessageEl = document.getElementById("manualMessage");
    const blFromDateEl = document.getElementById("blFromDate");
    const blToDateEl = document.getElementById("blToDate");
    const blRangeStartEl = document.getElementById("blRangeStart");
    const blRangeEndEl = document.getElementById("blRangeEnd");
    const blockRangeMessageEl = document.getElementById("blockRangeMessage");
    const dayViewDateEl = document.getElementById("dayViewDate");
    const dayViewRowsEl = document.getElementById("dayViewRows");
    const dayViewSummaryEl = document.getElementById("dayViewSummary");
    const appointmentsFilterLabelEl = document.getElementById("appointmentsFilterLabel");
    const appointmentsCountLabelEl = document.getElementById("appointmentsCountLabel");
    const appointmentsSearchEl = document.getElementById("appointmentsSearch");
    const appointmentsPrintEl = document.getElementById("appointmentsPrint");
    const appointmentsExportEl = document.getElementById("appointmentsExport");
    const appointmentsPageInfoEl = document.getElementById("appointmentsPageInfo");
    const appointmentsPageSizeEl = document.getElementById("appointmentsPageSize");
    const appointmentsPrevEl = document.getElementById("appointmentsPrev");
    const appointmentsNextEl = document.getElementById("appointmentsNext");
    const toggleAppointmentsScopeBtn = document.getElementById("toggleAppointmentsScope");
    const editModalEl = document.getElementById("editModal");
    const closeEditModalEl = document.getElementById("closeEditModal");
    const saveEditEl = document.getElementById("saveEdit");
    const editPatientEl = document.getElementById("editPatient");
    const editEmailEl = document.getElementById("editEmail");
    const editServiceEl = document.getElementById("editService");
    const editDateEl = document.getElementById("editDate");
    const editPhoneEl = document.getElementById("editPhone");
    const editStatusEl = document.getElementById("editStatus");
    const editNotesEl = document.getElementById("editNotes");
    const editSlotsEl = document.getElementById("editSlots");
    const editSlotsMsgEl = document.getElementById("editSlotsMsg");
    const editMessageEl = document.getElementById("editMessage");
    const appointmentsById = new Map();
    let editingAppointmentId = null;
    let selectedEditSlot = "";
    let appointmentsPage = 1;
    let showAllAppointments = false;
    let latestFilteredAppointments = [];

    function toDateInputValue(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function statusLabel(status) {
      if (status === "booked") return "Закажан";
      if (status === "confirmed") return "Потврден";
      if (status === "cancelled") return "Откажан";
      if (status === "completed") return "Завршен";
      return status;
    }

    function statusClass(status) {
      if (status === "booked") return "status-booked";
      if (status === "confirmed") return "status-confirmed";
      if (status === "cancelled") return "status-cancelled";
      if (status === "completed") return "status-completed";
      return "status-cancelled";
    }

    function formatDateToMk(dateStr) {
      const [year, month, day] = String(dateStr || "").split("-");
      if (!year || !month || !day) return dateStr || "";
      return `${day}.${month}.${year}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function loadDoctors() {
      const doctors = await fetchJson("/api/doctors");
      if (!doctors.length) {
        throw new Error("Нема активни доктори");
      }
      currentDoctorId = Number(doctors[0].id);
      await syncRangeHoursToClinic();
      await refreshAll();
    }

    async function syncRangeHoursToClinic() {
      if (!currentDoctorId || !blFromDateEl.value) return;

      try {
        const fromDate = blFromDateEl.value;
        const toDate = blToDateEl.value || fromDate;

        const [fromData, toData] = await Promise.all([
          fetchJson(`/api/admin/working-hours?doctorId=${currentDoctorId}&date=${fromDate}`),
          fetchJson(`/api/admin/working-hours?doctorId=${currentDoctorId}&date=${toDate}`),
        ]);

        if (!fromData.earliest || !fromData.latest) {
          blockRangeMessageEl.className = "muted msg-error";
          blockRangeMessageEl.textContent = "Нема дефинирано работно време за Од датум.";
          return;
        }

        if (!toData.earliest || !toData.latest) {
          blockRangeMessageEl.className = "muted msg-error";
          blockRangeMessageEl.textContent = "Нема дефинирано работно време за До датум.";
          return;
        }

        blRangeStartEl.min = fromData.earliest;
        blRangeStartEl.max = fromData.latest;
        blRangeEndEl.min = toData.earliest;
        blRangeEndEl.max = toData.latest;

        blRangeStartEl.value = fromData.earliest;
        blRangeEndEl.value = toData.latest;

        blockRangeMessageEl.className = "muted";
        blockRangeMessageEl.textContent = `Од: ${fromData.earliest}-${fromData.latest} • До: ${toData.earliest}-${toData.latest}`;
      } catch (error) {
        blockRangeMessageEl.className = "muted msg-error";
        blockRangeMessageEl.textContent = error.message;
      }
    }

    async function refreshAll() {
      await Promise.all([loadBlocks(), loadAppointments()]);
      await Promise.all([loadManualSlots(), loadDayView()]);
    }

    async function loadDayView() {
      const doctorId = currentDoctorId;
      const date = dayViewDateEl.value;

      if (!doctorId || !date) {
        dayViewRowsEl.innerHTML = "";
        dayViewSummaryEl.textContent = "Одбери датум за преглед.";
        return;
      }

      const [appointments, slotsResponse] = await Promise.all([
        fetchJson(`/api/admin/appointments?doctorId=${doctorId}`),
        fetchJson(`/api/slots?doctorId=${doctorId}&date=${date}`),
      ]);
      const freeSlots = Array.isArray(slotsResponse) ? slotsResponse : (slotsResponse.slots || []);

      const onDateAppointments = appointments.filter((a) => a.date === date);

      const entries = [
        ...freeSlots.map((slot) => ({
          time: slot.start,
          end: slot.end,
          status: "free",
          patient: "",
          phone: "",
          service: "",
          notes: "",
        })),
        ...onDateAppointments.map((a) => ({
          time: a.start_time,
          end: a.end_time,
          status: a.status,
          patient: a.patient_name || "",
          phone: a.patient_phone || "",
          service: a.service_type || "",
          notes: a.notes || "",
        })),
      ].sort((a, b) => a.time.localeCompare(b.time));

      if (!entries.length) {
        dayViewRowsEl.innerHTML = `<tr><td colspan="6" class="muted">Нема термини за овој датум.</td></tr>`;
        dayViewSummaryEl.textContent = `${date} • Нема записи`;
        return;
      }

      const freeCount = entries.filter((e) => e.status === "free").length;
      const bookedCount = entries.filter((e) => e.status === "booked" || e.status === "confirmed").length;
      dayViewSummaryEl.textContent = `${date} • Зафатени: ${bookedCount} • Слободни: ${freeCount}`;

      dayViewRowsEl.innerHTML = entries
        .map((entry) => {
          const chip =
            entry.status === "free"
              ? `<span class="status-chip status-free">Слободен</span>`
              : `<span class="status-chip ${statusClass(entry.status)}">${statusLabel(entry.status)}</span>`;

          const safeTime = escapeHtml(entry.time);
          const safeEnd = escapeHtml(entry.end);
          const safePatient = escapeHtml(entry.patient);
          const safePhone = escapeHtml(entry.phone);
          const safeService = escapeHtml(entry.service);
          const safeNotes = escapeHtml(entry.notes);

          return `
            <tr>
              <td>${safeTime} - ${safeEnd}</td>
              <td>${chip}</td>
              <td>${safePatient}</td>
              <td>${safePhone}</td>
              <td>${safeService}</td>
              <td>${safeNotes}</td>
            </tr>
          `;
        })
        .join("");
    }

    function resetManSlots() {
      selectedManSlot = "";
      manSlotsEl.innerHTML = "";
      manSlotsMsgEl.textContent = "";
    }

    async function loadManualSlots() {
      const doctorId = currentDoctorId;
      const date = manDateEl.value;

      resetManSlots();
      if (!doctorId || !date) return;

      if (!manServiceEl.value) {

        manSlotsMsgEl.textContent = "Прво изберете тип на услуга за да видите слободни термини.";
        return;
      }

      manSlotsMsgEl.textContent = "Се вчитува...";

      try {
        const serviceParam = manServiceEl.value ? `&serviceType=${encodeURIComponent(manServiceEl.value)}` : "";
        const slotsResponse = await fetchJson(`/api/slots?doctorId=${doctorId}&date=${date}${serviceParam}`);
        const allSlots = Array.isArray(slotsResponse.allSlots) ? slotsResponse.allSlots
          : Array.isArray(slotsResponse) ? slotsResponse
          : (slotsResponse.slots || []);

        manSlotsMsgEl.textContent = "";

        if (!allSlots.length) {
          manSlotsMsgEl.textContent = slotsResponse.message || "Нема слободни термини за овој датум.";
          return;
        }

        allSlots.forEach((slot) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "man-slot";
          btn.textContent = `${slot.start} - ${slot.end}`;

          const unavailable = slot.available === false || slot.status === "full" || slot.status === "blocked";
          if (unavailable) {
            btn.disabled = true;
            btn.title = "Терминот е зафатен";
          } else {
            btn.addEventListener("click", () => {
              manSlotsEl.querySelectorAll(".man-slot").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
              selectedManSlot = slot.start;
            });
          }
          manSlotsEl.appendChild(btn);
        });
      } catch {
        manSlotsMsgEl.textContent = "Грешка при вчитување на термини.";
      }
    }

      const rows = await fetchJson(`/api/admin/blocks?doctorId=${currentDoctorId}`);

      tbody.innerHTML = rows
        .map((r) => {

            <tr>

              <td>${safeStart}</td>

        params.set("to", dayViewDateEl.value);

    function updateAppointmentsFilterUi() {
      if (showAllAppointments) {
        appointmentsFilterLabelEl.textContent = "Прикажани: сите датуми";
        toggleAppointmentsScopeBtn.textContent = "Само избран датум";
        return;
      }

      const selected = dayViewDateEl.value;
      appointmentsFilterLabelEl.textContent = selected
        ? `Прикажани: ${formatDateToMk(selected)}`
        : "Прикажани: избран датум";
      toggleAppointmentsScopeBtn.textContent = "Прикажи сите";
    }

    async function loadAppointments(options = {}) {
      const preserveScroll = Boolean(options.preserveScroll);
      const prevScrollX = window.scrollX;
      const prevScrollY = window.scrollY;
      const restoreScrollIfNeeded = () => {
        if (!preserveScroll) return;
        requestAnimationFrame(() => {
          window.scrollTo(prevScrollX, prevScrollY);
        });
      };

      const params = getAppointmentsFilterParams();
      const rows = await fetchJson(`/api/admin/appointments?${params.toString()}`);
      rows.sort((a, b) => {
        const left = `${a.date} ${a.start_time}`;
        const right = `${b.date} ${b.start_time}`;
        return right.localeCompare(left);
      });

      const query = String(appointmentsSearchEl.value || "").trim().toLowerCase();
      const filteredRows = !query
        ? rows
        : rows.filter((r) => {
            const patient = String(r.patient_name || "").toLowerCase();
            const phone = String(r.patient_phone || "").toLowerCase();
            return patient.includes(query) || phone.includes(query);
          });
      latestFilteredAppointments = filteredRows.slice();

      const uniquePatients = new Set(
        filteredRows.map((r) => `${String(r.patient_name || "").trim().toLowerCase()}|${String(r.patient_phone || "").trim()}`)
      ).size;

      appointmentsCountLabelEl.textContent = showAllAppointments
        ? `Вкупно пациенти: ${uniquePatients}`
        : `Пациенти: ${uniquePatients}`;

      appointmentsById.clear();
      const pageSize = Math.max(1, Number(appointmentsPageSizeEl.value) || 25);
      const totalRows = filteredRows.length;
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      if (appointmentsPage > totalPages) appointmentsPage = totalPages;
      if (appointmentsPage < 1) appointmentsPage = 1;

      const startIndex = (appointmentsPage - 1) * pageSize;
      const pageRows = filteredRows.slice(startIndex, startIndex + pageSize);

      appointmentsPageInfoEl.textContent = `Страна ${appointmentsPage} од ${totalPages} • Записи: ${totalRows}`;
      appointmentsPrevEl.disabled = appointmentsPage <= 1;
      appointmentsNextEl.disabled = appointmentsPage >= totalPages;

      pageRows.forEach((r) => appointmentsById.set(Number(r.id), r));

      updateAppointmentsFilterUi();
      const tbody = document.getElementById("appointmentRows");
      if (!filteredRows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted">Нема резултати за пребарувањето.</td></tr>`;
        appointmentsPageInfoEl.textContent = "Страна 1 од 1 • Записи: 0";
        appointmentsPrevEl.disabled = true;
        appointmentsNextEl.disabled = true;
        restoreScrollIfNeeded();
        return;
      }

      tbody.innerHTML = pageRows
        .map((r) => {
          const safeId = Number(r.id) || 0;
          const safeDate = escapeHtml(formatDateToMk(r.date));
          const safeStart = escapeHtml(r.start_time);
          const safeEnd = escapeHtml(r.end_time);
          const safePatient = escapeHtml(r.patient_name);
          const safePhone = escapeHtml(r.patient_phone);
          const safeService = escapeHtml(r.service_type || "");
          return `
            <tr>
              <td>${safeDate}</td>
              <td>${safeStart} - ${safeEnd}</td>
              <td>${safePatient}</td>
              <td>${safePhone}</td>
              <td>${safeService}</td>
              <td>
                <select onchange="updateStatus(${safeId}, this.value)">
                  ${[
                    { value: "booked", label: "Закажан" },
                    { value: "cancelled", label: "Откажан" },
                    { value: "completed", label: "Завршен" }
                  ].map(s => `<option value="${s.value}" ${s.value===r.status?"selected":""}>${s.label}</option>`).join("")}
                </select>
              </td>
              <td><button class="small" type="button" onclick="openEditModal(${safeId})">Измени</button></td>
            </tr>
          `;
        })
        .join("");

      restoreScrollIfNeeded();
    }

    function resetEditSlots() {
      selectedEditSlot = "";
      editSlotsEl.innerHTML = "";
      editSlotsMsgEl.textContent = "";
    }

    async function loadEditSlots() {
      resetEditSlots();
      const date = editDateEl.value;
      if (!currentDoctorId || !date) return;
      if (!editServiceEl.value) {
        editSlotsMsgEl.textContent = "Прво изберете тип на услуга.";
        return;
      }

      editSlotsMsgEl.textContent = "Се вчитува...";
      const editing = appointmentsById.get(Number(editingAppointmentId));
      const currentStart = editing ? String(editing.start_time) : "";

      try {
        const serviceParam = `&serviceType=${encodeURIComponent(editServiceEl.value)}`;
        const res = await fetchJson(`/api/slots?doctorId=${currentDoctorId}&date=${date}${serviceParam}`);
        const allSlots = Array.isArray(res.allSlots) ? res.allSlots : (Array.isArray(res) ? res : (res.slots || []));
        editSlotsMsgEl.textContent = "";

        if (!allSlots.length) {
          editSlotsMsgEl.textContent = res.message || "Нема термини за избраниот датум.";
          return;
        }

        allSlots.forEach((slot) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "edit-slot";
          btn.textContent = `${slot.start} - ${slot.end}`;

          const isCurrent = slot.start === currentStart;
          const unavailable = slot.available === false || slot.status === "full" || slot.status === "blocked";

          if (unavailable && !isCurrent) {
            btn.disabled = true;
          }

          if (isCurrent) {
            btn.classList.add("active");
            selectedEditSlot = slot.start;
          }

          btn.addEventListener("click", () => {
            editSlotsEl.querySelectorAll(".edit-slot").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            selectedEditSlot = slot.start;
          });

          editSlotsEl.appendChild(btn);
        });
      } catch (error) {
        editSlotsMsgEl.textContent = error.message || "Грешка при вчитување термини.";
      }
    }

    function closeEditModal() {
      editModalEl.classList.remove("show");
      editModalEl.setAttribute("aria-hidden", "true");
      editingAppointmentId = null;
      resetEditSlots();
      editMessageEl.textContent = "";
      editMessageEl.className = "muted";
    }

    async function openEditModal(id) {
      const row = appointmentsById.get(Number(id));
      if (!row) return;

      editingAppointmentId = Number(id);
      editPatientEl.value = row.patient_name || "";
      editEmailEl.value = row.patient_email || "";
      editServiceEl.value = row.service_type || "контрола";
      editDateEl.value = row.date || "";
      editPhoneEl.value = row.patient_phone || "";
      editStatusEl.value = row.status || "booked";
      editNotesEl.value = row.notes || "";
      editMessageEl.textContent = "";
      editMessageEl.className = "muted";

      editModalEl.classList.add("show");
      editModalEl.setAttribute("aria-hidden", "false");
      await loadEditSlots();
    }

    async function saveEditAppointment() {
      if (!editingAppointmentId) return;

      const payload = {
        patientName: editPatientEl.value.trim(),
        patientEmail: editEmailEl.value.trim(),
        patientPhone: editPhoneEl.value.trim(),
        serviceType: editServiceEl.value.trim(),
        notes: editNotesEl.value.trim(),
        date: editDateEl.value,
        startTime: selectedEditSlot,
        status: editStatusEl.value,
      };

      if (!payload.patientName || !payload.patientPhone || !payload.date || !payload.startTime) {
        editMessageEl.className = "muted msg-error";
        editMessageEl.textContent = "Внесете пациент, телефон, датум и термин.";
        return;
      }

      if (payload.serviceType === BABY_SERVICE_NAME && !isBabyServiceAllowedDay(payload.date)) {
        editMessageEl.className = "muted msg-error";
        editMessageEl.textContent = "Услугата „преглед за бебиња до 6 месеци“ е достапна само во Понеделник и Четврток.";
        return;
      }

      await fetchJson(`/api/admin/appointments/${editingAppointmentId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      editMessageEl.className = "muted msg-success";
      editMessageEl.textContent = "Терминот е успешно изменет.";
      await Promise.all([loadAppointments(), loadDayView(), loadManualSlots()]);
      closeEditModal();
    }

    async function addBlockRange() {
      blockRangeMessageEl.className = "muted";
      blockRangeMessageEl.textContent = "";

      const payload = {
        doctorId: currentDoctorId,
        fromDate: blFromDateEl.value,
        toDate: blToDateEl.value,
        startTime: blRangeStartEl.value,
        endTime: blRangeEndEl.value,
        fullDay: false,
        reason: "",
      };

      if (!payload.fromDate || !payload.toDate || !payload.startTime || !payload.endTime) {
        blockRangeMessageEl.className = "muted msg-error";
        blockRangeMessageEl.textContent = "Внесете од/до датум и почеток/крај.";
        return;
      }

      const data = await fetchJson("/api/admin/blocks/range", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      blockRangeMessageEl.className = "muted msg-success";
      blockRangeMessageEl.textContent = `Додадени: ${data.inserted}, прескокнати: ${data.skipped}.`;
      await Promise.all([loadBlocks(), loadDayView(), loadManualSlots()]);
    }

    async function addManualAppointment() {
      manualMessageEl.textContent = "";
      manualMessageEl.className = "muted";

      const payload = {
        doctorId: currentDoctorId,
        date: manDateEl.value,
        startTime: selectedManSlot,
        patientName: manPatientEl.value.trim(),
        patientPhone: manPhoneEl.value.trim(),
        patientEmail: manEmailEl.value.trim(),
        serviceType: manServiceEl.value.trim(),
        notes: manNotesEl.value.trim(),
      };

      if (!payload.date || !payload.startTime || !payload.patientName || !payload.patientPhone) {
        manualMessageEl.className = "muted msg-error";
        manualMessageEl.textContent = !payload.startTime
          ? "Изберете термин од листата на слободни термини."
          : "Внесете датум, пациент и телефон.";
        return;
      }

      // Validate baby service date restriction
      if (payload.serviceType === BABY_SERVICE_NAME && !isBabyServiceAllowedDay(payload.date)) {
        manualMessageEl.className = "muted msg-error";
        manualMessageEl.textContent = "Услугата „преглед за бебиња до 6 месеци“ е достапна само во Понеделник и Четврток.";
        return;
      }

      await fetchJson("/api/admin/appointments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      manualMessageEl.className = "muted msg-success";
      manualMessageEl.textContent = "Терминот е успешно додаден.";
      manPatientEl.value = "";
      manPhoneEl.value = "";
      manEmailEl.value = "";
      manServiceEl.value = "";
      manNotesEl.value = "";
      resetManSlots();
      manDateEl.value = "";
      await Promise.all([loadAppointments(), loadDayView()]);
    }

    async function deleteBlock(id) {
      await fetchJson(`/api/admin/blocks/${id}`, { method: "DELETE" });
      await Promise.all([loadBlocks(), loadDayView()]);
    }

    async function updateStatus(id, status) {
      await fetchJson(`/api/admin/appointments/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
      });
      await Promise.all([loadAppointments(), loadDayView(), loadManualSlots()]);
    }

    });
    toggleAppointmentsScopeBtn.addEventListener("click", async () => {

      appointmentsPage = 1;

    });

      await loadAppointments({ preserveScroll: true });

    });

    appointmentsPrevEl.addEventListener("click", async () => {

      appointmentsPage -= 1;
      await loadAppointments({ preserveScroll: true });

    appointmentsNextEl.addEventListener("click", async () => {
      appointmentsPage += 1;
      await loadAppointments({ preserveScroll: true });
    });
    manDateEl.addEventListener("change", loadManualSlots);
    dayViewDateEl.addEventListener("change", async () => {
      await loadDayView();
      if (!showAllAppointments) {
        appointmentsPage = 1;
        await loadAppointments();
      }
    });
    manPhoneEl.addEventListener("input", () => {
      manPhoneEl.value = manPhoneEl.value.replace(/\D/g, "");
    });

    // Validate baby service date restriction (only Monday and Thursday)
    const BABY_SERVICE_NAME = "преглед за бебиња до 6 месеци";
    const BABY_SERVICE_ALLOWED_DAYS = new Set([1, 4]); // 1 = Monday, 4 = Thursday
    
    function isBabyServiceAllowedDay(dateString) {
      if (!dateString) return false;
      const date = new Date(dateString + "T00:00:00");
      const dayOfWeek = date.getDay();
      return BABY_SERVICE_ALLOWED_DAYS.has(dayOfWeek);
    }

    function validateBabyServiceDate() {
      if (manServiceEl.value === BABY_SERVICE_NAME && manDateEl.value) {
        if (!isBabyServiceAllowedDay(manDateEl.value)) {
          manualMessageEl.textContent = "Услугата „преглед за бебиња до 6 месеци“ е достапна само во Понеделник и Четврток.";
          manualMessageEl.className = "muted msg-error";
          return false;
        }
      }
      return true;
    }

    manServiceEl.addEventListener("change", () => {
      resetManSlots();
      manualMessageEl.textContent = "";
      // If date already chosen, reload slots for new service
      if (manServiceEl.value && manDateEl.value) {
        if (manServiceEl.value === BABY_SERVICE_NAME) {
          validateBabyServiceDate();
        }
        loadManualSlots();
      }
    });

    manDateEl.addEventListener("change", () => {
      if (manServiceEl.value === BABY_SERVICE_NAME) {
        validateBabyServiceDate();
      }
    });

    const today = toDateInputValue();
    manDateEl.min = today;
    blFromDateEl.min = today;
    blToDateEl.min = today;
    dayViewDateEl.min = today;
    // manDate starts disabled; value set only after service is selected
    blFromDateEl.value = today;
    blToDateEl.value = today;
    dayViewDateEl.value = today;

    loadDoctors();
  </script>
</body>
</html>
