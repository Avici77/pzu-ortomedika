services:
  - type: web
    name: pzu-ortomedika-booking
    env: node
    rootDir: booking-system
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/data.db
      - key: ADMIN_USERNAME
        value: Noli
      - key: ADMIN_PASSWORD
        value: Danilo
    disk:
      name: booking-data
      mountPath: /var/data
      sizeGB: 1
